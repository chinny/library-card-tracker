# EXAMPLE ONLY — do not commit real values. Prefer sealed-secrets / SOPS / External
# Secrets so the plaintext never lives in git. The master key here decrypts every
# stored PIN; back it up out-of-band and keep it OUT of any DB backup.
#
# Generate a master key:  npm run cli -- gen-key
apiVersion: v1
kind: Secret
metadata:
  name: library-card-tracker
  namespace: library-card-tracker
type: Opaque
stringData:
  LIBCARD_MASTER_KEY: "REPLACE_WITH_BASE64_32_BYTE_KEY"
  LIBCARD_AUTH_USER: "changeme"
  LIBCARD_AUTH_PASS: "change-this-strong-password"
