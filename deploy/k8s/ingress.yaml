# Internal-only ingress. The app enforces Basic Auth itself; keep this off any
# public/WAN-facing ingress controller. TLS strongly recommended (Basic Auth over
# plain HTTP sends credentials in the clear).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: library-card-tracker
  namespace: library-card-tracker
spec:
  ingressClassName: traefik           # k3s default; change to match your cluster
  rules:
    - host: library.internal.example   # your internal hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: library-card-tracker
                port:
                  name: http
  tls:
    - hosts:
        - library.internal.example
      secretName: library-card-tracker-tls   # provide your own cert/secret
