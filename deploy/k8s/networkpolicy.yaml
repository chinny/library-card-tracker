# Baseline NetworkPolicy (works on any CNI). Vanilla NetworkPolicy can't match
# egress by hostname, so this allows DNS + outbound HTTPS broadly. For a true
# per-library egress allowlist, use the Cilium FQDN policy in ciliumnetworkpolicy.yaml.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: library-card-tracker
  namespace: library-card-tracker
spec:
  podSelector:
    matchLabels:
      app: library-card-tracker
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # Only the ingress controller may reach the app. Adjust the namespace label.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: http
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Outbound HTTPS to the libraries (broad — narrow with Cilium FQDNs).
    - ports:
        - port: 443
          protocol: TCP
