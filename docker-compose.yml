# Example local run. Copy .env.example -> .env and set at least LIBCARD_MASTER_KEY
# (and LIBCARD_AUTH_USER / LIBCARD_AUTH_PASS to protect the UI).
#
#   docker compose up --build
#   open http://localhost:8080
services:
  library-card-tracker:
    build: .
    image: library-card-tracker:local
    ports:
      - "8080:8080"
    environment:
      # Pulled from your .env (never commit it). Examples:
      LIBCARD_MASTER_KEY: "${LIBCARD_MASTER_KEY:?set LIBCARD_MASTER_KEY in .env}"
      LIBCARD_AUTH_USER: "${LIBCARD_AUTH_USER:-}"
      LIBCARD_AUTH_PASS: "${LIBCARD_AUTH_PASS:-}"
      LIBCARD_REFRESH_MINUTES: "${LIBCARD_REFRESH_MINUTES:-360}"
    volumes:
      - libcard-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  libcard-data:
